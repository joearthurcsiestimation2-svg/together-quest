<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Together Quest ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #2c3e50; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif; }
        #game-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        #lobby-ui { position: absolute; background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0px 10px 25px rgba(0,0,0,0.3); z-index: 10; }
        input, button { padding: 12px; margin: 8px; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; }
        button { background-color: #e74c3c; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #c0392b; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="lobby-ui">
        <h2>Together Quest ❤️</h2>
        <p>Apna naam aur same Room Code enter karein!</p>
        <input type="text" id="playerName" placeholder="Apna Name" maxlength="10"><br>
        <input type="text" id="roomCode" placeholder="6-Digit Room Code" maxlength="6"><br>
        <button id="joinBtn">Connect & Play</button>
    </div>
    <div id="game-container"></div>
    <script src="game.js"></script>
</body>
</html>
