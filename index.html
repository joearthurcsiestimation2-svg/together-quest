<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Together Quest ❤️</title>
    
    <!-- Phaser 3 Game Engine Framework -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    
    <!-- Firebase Core and Realtime Database Legacy Scripts (Stable & Zero Configuration Required) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body { margin: 0; padding: 0; background-color: #1a252f; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', Arial, sans-serif; }
        #game-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        #lobby-ui { position: absolute; background: white; padding: 35px; border-radius: 20px; text-align: center; box-shadow: 0px 15px 35px rgba(0,0,0,0.4); z-index: 10; width: 280px; }
        h2 { color: #e74c3c; margin-top: 0; font-size: 24px; }
        p { color: #7f8c8d; font-size: 14px; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; margin: 8px 0; font-size: 16px; border-radius: 8px; border: 2px solid #bdc3c7; text-align: center; outline: none; transition: 0.2s; }
        input:focus { border-color: #e74c3c; }
        button { width: 100%; padding: 14px; margin-top: 15px; font-size: 16px; border-radius: 8px; background-color: #e74c3c; color: white; border: none; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button:hover { background-color: #c0392b; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="lobby-ui">
        <h2>Together Quest ❤️</h2>
        <p>Enter your names & same Room Code to start your romantic journey!</p>
        <input type="text" id="playerName" placeholder="Apna Name" maxlength="10"><br>
        <input type="text" id="roomCode" placeholder="6-Digit Room Code" maxlength="6"><br>
        <button id="joinBtn">Ready & Connect</button>
    </div>

    <div id="game-container"></div>

    <script src="game.js"></script>
</body>
</html>
